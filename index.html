<html>
  <head>
    <style>
      body {
        text-align: center;
        font-family: Arial;
        background-color: #f0fff4;
      }

      .fade-in {
        opacity: 0;
        animation: fadeIn 2s forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      .slide-up {
        transform: translateY(50px);
        opacity: 0;
        animation: slideUp 1.5s forwards;
      }

      @keyframes slideUp {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      img {
        border-radius: 15px;
        transition: transform 0.3s ease;
        margin: 10px;
      }

      img:hover {
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>

    <h1 class="fade-in">Instructions on your new plant</h1>

    <br>

    <!-- FIRST IMAGE -->
    <img class="fade-in" src="plant.png" width="400">

    <br><br>

    <!-- STEP 1 -->
    <h2 class="slide-up">1)</h2>
    <h3 class="slide-up">Pull the tab from underneath the pot that says "pull"</h3>

    <p class="fade-in">This is what your plant should look like 🌿</p>

    <!-- PHOTO 1 -->
    <img class="fade-in" src="photo1.jpg" width="400">

    <br><br>

    <!-- STEP 2 -->
    <h2 class="slide-up">2)</h2>
    <h3 class="slide-up">
      When you pull the tab it will open up the bottom and then you can plant 
      the plant into the soil including the box because it will decompose and mulch down.
    </h3>

    <!-- PHOTO 2 -->
    <img class="fade-in" src="photo2.jpg" width="400">

  </body>
</html>
